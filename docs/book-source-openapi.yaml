openapi: 3.1.0
info:
  title: Open Reading Source Protocol
  version: 1.2.0
  description: Standard API implemented by an Open Reading compatible public, no-sign-in book source. Implementations must not bypass payment, DRM, authentication, or other access controls.
servers:
  - url: https://books.example.org/api
paths:
  /v1/discover:
    get:
      operationId: discoverBooks
      responses:
        '200':
          description: Curated discovery shelves
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoveryPage' }
  /v1/categories:
    get:
      operationId: listCategories
      responses:
        '200':
          description: Browseable categories
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
  /v1/browse:
    get:
      operationId: browseBooks
      parameters:
        - name: category
          in: query
          schema: { type: string, maxLength: 200 }
        - name: sort
          in: query
          schema: { type: string, enum: [popular, latest], default: latest }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Browse results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchPage' }
  /v1/search:
    get:
      operationId: searchBooks
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchPage' }
  /v1/books/{bookId}:
    get:
      operationId: getBook
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Book' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/books/{bookId}/chapters:
    get:
      operationId: listChapters
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Chapter catalog
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Chapter' }
  /v1/books/{bookId}/chapters/{chapterId}:
    get:
      operationId: getChapterContent
      parameters:
        - $ref: '#/components/parameters/BookId'
        - name: chapterId
          in: path
          required: true
          schema: { type: string, minLength: 1, maxLength: 500 }
      responses:
        '200':
          description: Chapter content
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterContent' }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  parameters:
    BookId:
      name: bookId
      in: path
      required: true
      schema: { type: string, minLength: 1, maxLength: 500 }
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    SourceManifest:
      type: object
      required: [protocol, protocolVersion, id, name, apiBaseUrl, capabilities]
      properties:
        protocol: { type: string, const: open-reading-source }
        protocolVersion: { type: string, pattern: '^1\\.[0-9]+$' }
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string }
        apiBaseUrl: { type: string, format: uri }
        iconUrl: { type: string, format: uri }
        websiteUrl: { type: string, format: uri }
        operatorName: { type: string, description: Operator responsible for the source service and rights requests. }
        contactUrl: { type: string, format: uri, description: Public contact or rights-report URL controlled by the operator. }
        contentLicense: { type: string, description: License name or concise authorization basis for the served content. }
        rightsStatement: { type: string, description: Concise provenance and rights statement supplied by the operator. }
        languages:
          type: array
          items: { type: string }
        capabilities:
          type: array
          contains: { const: search }
          items: { type: string }
    Book:
      type: object
      required: [id, title]
      properties:
        id: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        author: { type: string }
        description: { type: string }
        coverUrl: { type: string, format: uri }
        categories:
          type: array
          items: { type: string }
        status: { type: string, enum: [ongoing, completed, hiatus, unknown] }
        latestChapter: { type: string }
        updatedAt: { type: string, format: date-time }
    SearchPage:
      type: object
      required: [items, page, pageSize, hasMore]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Book' }
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 0 }
        hasMore: { type: boolean }
    DiscoveryPage:
      type: object
      required: [sections]
      properties:
        sections:
          type: array
          items: { $ref: '#/components/schemas/DiscoverySection' }
    DiscoverySection:
      type: object
      required: [id, title, items]
      properties:
        id: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        items:
          type: array
          items: { $ref: '#/components/schemas/Book' }
    Category:
      type: object
      required: [id, name]
      properties:
        id: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
    Chapter:
      type: object
      required: [id, title, order]
      properties:
        id: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        order: { type: integer, minimum: 0 }
        updatedAt: { type: string, format: date-time }
    ChapterContent:
      type: object
      required: [bookId, chapterId, title, contentType, content]
      properties:
        bookId: { type: string, minLength: 1 }
        chapterId: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        contentType:
          type: string
          enum: [text/plain, text/markdown, text/html]
        content: { type: string }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
