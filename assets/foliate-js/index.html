<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Origo Foliate Host</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
      touch-action: manipulation;
      user-select: none;
    }
    #reader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
    }
    foliate-view {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }
    #footnote-dialog {
      position: fixed;
      width: 80vw;
      height: 80vh;
      max-width: 420px;
      max-height: 240px;
      min-width: 280px;
      min-height: 180px;
      border-radius: 14px;
      border: 1px solid rgba(128, 128, 128, 0.45);
      user-select: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      outline: none;
      z-index: 1000;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
    }
    #footnote-dialog main {
      overflow: auto;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div id="footnote-dialog"><main></main></div>
  <script type="module" src="./host.js"></script>
</body>
</html>
